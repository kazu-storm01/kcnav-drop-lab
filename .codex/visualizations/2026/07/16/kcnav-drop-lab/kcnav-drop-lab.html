          <summary>抽選設定と確率</summary>

        const errors=parsedImport?.errors||[]; const ignored=parsedImport?.ignored||[]; const summary=parsedImport?`入力${parsedImport.inputLines}行・解析${parsedImport.rows.length}行・無視${ignored.length}行` : ''; const invalid=!parsedImport?.rows.length || errors.some(error=>/検出|重複|読み取れません|母数が複数|100%を超え/.test(error)); $('#parse-status').className=`parse-status${errors.length||ignored.length?' warning':''}`; $('#parse-status').textContent=errors.length?`${summary}　${errors.join(' / ')}`:ignored.length?`${summary}　無視した行: ${ignored.join(', ')}`:`解析成功　${summary}　${ranks}`; $('#save-import').disabled=invalid; $('#update-import').disabled=invalid;
      }
      function clearParsedImport(message) { parsedImport=null; $('#kcnav-text').value=''; $('#parse-preview').innerHTML=''; $('#parse-status').textContent=message; $('#save-import').disabled=true; $('#update-import').disabled=true; }
      function saveImportedProfile() {
        if(!parsedImport?.rows.length) return;
        const ships=[...new Set(parsedImport.rows.map(row=>row.ship))]; const knownTiers=Object.fromEntries(ships.filter(ship=>defaultTiers[ship]).map(ship=>[ship,defaultTiers[ship]])); const knownTargets=ships.filter(ship=>knownTiers[ship]==='priority');
        const title=$('#import-title').value.trim()||'新しい掘り先'; const profile={id:uid('profile'),title,event:'',map:$('#import-map').value.trim(),difficulty:$('#import-difficulty').value,node:$('#import-node').value.trim(),source:'KCNav貼り付け',updatedAt:new Date().toLocaleDateString('ja-JP'),drops:parsedImport.rows.map(({shownRate,...row})=>row),targets:knownTargets,tiers:knownTiers,logs:[]};
        const replaceEmpty=state.profiles.length===1 && !activeProfile().drops.length; if(replaceEmpty)state.profiles=[profile];else state.profiles.push(profile); state.activeId=profile.id; saveState(); clearParsedImport('登録しました'); renderProfile(); $('#import-section').open=false; announce(`${title}を登録しました`);
      }
      async function updateImportedProfile() {
        if(!parsedImport?.rows.length)return;
        const profile=activeProfile(); if(!await askConfirmation(`海域「${profile.title}」のドロップ表を、解析した ${parsedImport.rows.length}行で置き換えます。実戦ログは残ります。`,'ドロップ表を更新'))return;
        const ships=[...new Set(parsedImport.rows.map(row=>row.ship))]; const shipSet=new Set(ships);
        profile.drops=parsedImport.rows.map(({shownRate,...row})=>row);
        profile.targets=[...new Set(profile.targets.filter(ship=>shipSet.has(ship)).concat(ships.filter(ship=>defaultTiers[ship]==='priority')))];
        profile.tiers=Object.fromEntries(ships.map(ship=>[ship,profile.tiers?.[ship]||defaultTiers[ship]||'normal']));
        profile.source='KCNav貼り付け'; profile.updatedAt=new Date().toLocaleDateString('ja-JP');
        Object.keys(sessions).filter(key=>key.startsWith(`${profile.id}:`)).forEach(key=>delete sessions[key]);
        saveState(); clearParsedImport('現在のプリセットを更新しました'); renderProfile(); announce(`${profile.title}のドロップ表を更新しました`);
      }
      function saveProfileMeta() {
        const profile=activeProfile(); const title=$('#edit-title').value.trim();
        if(!title){$('#storage-status').textContent='プリセット名を入力してください';announce('プリセット名を入力してください');return;}
        profile.title=title; profile.map=$('#edit-map').value.trim(); profile.difficulty=$('#edit-difficulty').value; profile.node=$('#edit-node').value.trim(); profile.updatedAt=new Date().toLocaleDateString('ja-JP');
        saveState(); renderProfile(); announce(`${title}の設定を保存しました`);
      }
      function duplicateProfile() { const source=activeProfile(); const copy=clone(source); copy.id=uid('profile'); copy.title=`${source.title} コピー`; copy.logs=[]; state.profiles.push(copy); state.activeId=copy.id; saveState(); renderProfile(); announce(`${copy.title}を作成しました`); }
      async function deleteProfile() { const profile=activeProfile(); const last=state.profiles.length===1; const message=last?`最後のプリセット「${profile.title}」を削除します。実戦ログ ${profile.logs?.length||0}件も削除され、未設定プリセットに置き換わります。`:`プリセット「${profile.title}」を削除します。実戦ログ ${profile.logs?.length||0}件も削除されます。`; if(!await askConfirmation(message,'プリセットを削除'))return; const index=state.profiles.findIndex(item=>item.id===profile.id); Object.keys(sessions).filter(key=>key.startsWith(`${profile.id}:`)).forEach(key=>delete sessions[key]); if(last){const empty=createEmptyProfile();state.profiles=[empty];state.activeId=empty.id;}else{state.profiles.splice(index,1);state.activeId=state.profiles[Math.max(0,index-1)].id;} saveState();renderProfile();announce(`${profile.title}を削除しました`); }
      function addLog() { const profile=activeProfile(); const ship=$('#log-ship').value; const rank=$('#log-rank').value; profile.logs=profile.logs||[]; profile.logs.push({id:uid('log'),ship,rank,time:new Date().toLocaleString('ja-JP')}); saveState(); renderLogs(); announce(`${ship}、${rank}勝利として記録しました`); }
      async function clearLogs() { const profile=activeProfile(); const count=profile.logs?.length||0; if(!count)return; if(!await askConfirmation(`海域「${profile.title}」の実戦ログ ${count}件をすべて消去します。`,'ログを消去'))return; profile.logs=[]; saveState(); renderLogs(); announce('実戦ログを消去しました'); }
      async function clearCurrentSession() { const session=currentSession(); if(!session.length){announce('消去するシミュレーション結果はありません');return;} if(!await askConfirmation(`現在のシミュレーション結果 ${session.length}周分を消去します。`,'結果を消去'))return; sessions[sessionKey()]=[]; renderSession(); resetStage(); announce('現在のシミュレーション結果を消去しました'); }
      function exportJSON() { const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download=`kcnav-drop-lab-${new Date().toISOString().slice(0,10)}.json`; link.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
      async function importJSON() { const file=$('#import-json-file').files[0]; if(!file)return; const value=JSON.parse(await file.text()); if(!validateState(value))throw new Error('対応するバックアップではありません'); if(!await askConfirmation('現在の全海域と実戦ログを、このバックアップで置き換えます。','復元する'))return; try{localStorage.setItem(BACKUP_KEY,JSON.stringify(state));}catch{} state=normalizeState(value); state.activeId=state.profiles.some(profile=>profile.id===state.activeId)?state.activeId:state.profiles[0].id; sessions={}; saveState(); renderProfile(); announce('バックアップから復元しました'); }
      function escapeHtml(value) { return String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char])); }

      $('#profile-select').addEventListener('change',event=>{state.activeId=event.target.value;saveState();renderProfile();});
      $('#sound-toggle').addEventListener('click',toggleSound);
      $('#duplicate-profile').addEventListener('click',duplicateProfile); $('#delete-profile').addEventListener('click',deleteProfile);
      $('#rank-select').addEventListener('change',()=>{renderTargets();renderLogControls();renderDropTable();updateMetrics();renderSession();resetStage();});
      $('#rounds').addEventListener('input',updateMetrics); $('#rounds').addEventListener('blur',()=>{readRounds(true);updateMetrics();}); $('#goal-mode').addEventListener('change',updateMetrics);
      $('#single-run').addEventListener('click',()=>run(1)); $('#ten-run').addEventListener('click',()=>run(10)); $('#batch-run').addEventListener('click',()=>{const rounds=readRounds(true);updateMetrics();run(rounds);}); $('#clear-session').addEventListener('click',clearCurrentSession);
      $('#parse-kcnav').addEventListener('click',()=>{parsedImport=parseKCNav($('#kcnav-text').value);renderParsePreview();}); $('#save-import').addEventListener('click',saveImportedProfile); $('#update-import').addEventListener('click',updateImportedProfile);
      $('#save-profile-meta').addEventListener('click',saveProfileMeta); $('#refresh-images').addEventListener('click',()=>resolveImagesForProfile(activeProfile(),true));
      $('#add-log').addEventListener('click',addLog); $('#clear-logs').addEventListener('click',clearLogs);
      $('#export-json').addEventListener('click',exportJSON); $('#import-json').addEventListener('click',()=>importJSON().catch(error=>{$('#storage-status').textContent=error.message;announce(error.message);}));
      $('#confirm-cancel').addEventListener('click',()=>finishConfirmation(false)); $('#confirm-ok').addEventListener('click',()=>finishConfirmation(true)); $('#confirm-dialog').addEventListener('cancel',event=>{event.preventDefault();finishConfirmation(false);});
      renderSoundControl(); renderProfile();
    })();
  </script>
</div>
